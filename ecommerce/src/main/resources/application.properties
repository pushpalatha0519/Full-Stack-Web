spring.application.name=ecommerce

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

app.jwt.secret=change-this-demo-secret-key-to-a-longer-value-1234567890
app.jwt.expiration-ms=86400000
app.oauth2.authorized-redirect-uri=http://localhost:5173/oauth2/redirect

# Configure any provider you want to demo. Google is the quickest option.
# spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
# spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
# spring.security.oauth2.client.registration.google.scope=openid,profile,email
#
# For Microsoft Entra ID or Facebook, add the matching Spring Security
# client registration/provider properties here.
